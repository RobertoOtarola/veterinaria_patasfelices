<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Veterinaria PatasFelices{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        nav {
            background-color: #2c3e50;
            padding: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        nav a {
            color: #ecf0f1;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }
        nav a:hover {
            background-color: #34495e;
        }
        .container {
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #2c3e50;
            color: #fff;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .btn {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            margin: 0.2rem;
            border-radius: 4px;
            text-decoration: none;
            color: #fff;
            font-size: 0.85rem;
        }
        .btn-primary { background-color: #2980b9; }
        .btn-success { background-color: #27ae60; }
        .btn-warning { background-color: #f39c12; }
        .btn-danger  { background-color: #c0392b; }
        .btn:hover { opacity: 0.85; }
        button[type="submit"] {
            padding: 0.5rem 1.5rem;
            background-color: #27ae60;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        button[type="submit"]:hover { opacity: 0.85; }
        form p { margin: 0.5rem 0; }
        form label { font-weight: bold; }
        form input, form select, form textarea {
            width: 100%;
            padding: 0.4rem;
            margin-top: 0.25rem;
            box-sizing: border-box;
        }
        h1, h2 { color: #2c3e50; }
        .cancel-link {
            display: inline-block;
            margin-left: 1rem;
            color: #7f8c8d;
            text-decoration: none;
        }
        .cancel-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'fichas:inicio' %}">Inicio</a>
    <a href="{% url 'fichas:dueno_lista' %}">Dueños</a>
    <a href="{% url 'fichas:dueno_crear' %}">Nuevo Dueño</a>
    <a href="{% url 'fichas:mascota_lista' %}">Mascotas</a>
    <a href="{% url 'fichas:mascota_crear' %}">Nueva Mascota</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
